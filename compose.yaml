version: '3.8'

services:
  ollama-backend:
    image: ollama/ollama:latest
    container_name: hermes-ollama-backend
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_CTX=256000
      - WHATSAPP_ENABLED=false
    volumes:
      - ~/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # CORRECTED: hermes-ui is now aligned to 2 spaces (same level as ollama-backend)
  quant-market-agent:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    container_name: quant-market-agent
    restart: unless-stopped
    ports:
      - "8642:8642"
    environment:
      - OLLAMA_BASE_URL=http://ollama-backend:11434
      - HERMES_HOME=/opt/data
    volumes:
      - ~/.hermes:/opt/data
      - .:/project
    depends_on:
      - ollama-backend