version: '3.8'

services:
  ollama-backend:
    image: ollama/ollama:latest
    container_name: hermes-ollama-backend
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      # Bind to 0.0.0.0 so Hermes can reach the API across container boundaries
      - OLLAMA_HOST=0.0.0.0:11434
      # Keep models loaded in GPU VRAM longer
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_CTX=256000
    volumes:
      # Persists downloaded models on host
      - ~/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
              
  hermes-ui:
      # Build locally instead of pulling a remote image
      build:
        context: .
        dockerfile: Dockerfile.hermes
      container_name: hermes-agent-ui
      restart: unless-stopped
      ports:
        - "8642:8642"
      environment:
        - OLLAMA_BASE_URL=http://ollama-backend:11434
        - HERMES_HOME=/opt/data
      volumes:
        # Keeps your installed skills, memories, and settings safe across rebuilds
        - ~/.hermes:/opt/data
      depends_on:
        - ollama-backend
    